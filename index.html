<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careerely — Applications That Sound Like You</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#06060b;
            --border:rgba(255,255,255,0.06);
            --text:#eaeaf0;
            --text-mid:#9898ad;
            --text-dim:#64647a;
            --gradient:linear-gradient(135deg,#ec4899,#a855f7,#7c3aed);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
        body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
        nav{padding:20px 32px;border-bottom:1px solid var(--border)}
        .logo{font-weight:700;font-size:19px;letter-spacing:-0.3px}
        .logo span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px;position:relative}
        .hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:700px;height:600px;background:radial-gradient(circle,rgba(124,58,237,0.06) 0%,transparent 70%);filter:blur(60px);pointer-events:none}
        h1{font-size:clamp(36px,5.2vw,62px);font-weight:800;line-height:1.08;letter-spacing:-2px;max-width:700px;margin-bottom:20px}
        h1 .gr{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sub{font-size:17px;line-height:1.6;color:var(--text-mid);max-width:500px;margin-bottom:40px}
        .form{display:flex;gap:10px;width:100%;max-width:460px;margin-bottom:12px}
        .input{flex:1;padding:13px 18px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:all 0.2s}
        .input::placeholder{color:var(--text-dim)}
        .input:focus{border-color:rgba(124,58,237,0.4)}
        .btn{background:var(--gradient);color:white;padding:13px 28px;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:all 0.25s;box-shadow:0 4px 16px rgba(124,58,237,0.2)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.35)}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .note{font-size:12px;color:var(--text-dim)}
        .success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#22c55e;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;display:none;max-width:460px;width:100%;text-align:center}
        footer{padding:24px 32px;border-top:1px solid var(--border);text-align:center}
        footer p{font-size:12px;color:var(--text-dim)}
        @media(max-width:560px){.form{flex-direction:column}.btn{width:100%}}
    </style>
</head>
<body>

<nav>
    <div class="logo">Career<span>ely</span></div>
</nav>

<div class="hero">
    <h1>Stop writing applications.<br><span class="gr">Start landing jobs.</span></h1>
    <p class="sub">One tailored application outperforms a hundred generic ones. Careerely writes cover letters that sound like you, not like AI.</p>
    <div class="form" id="form">
        <input type="email" class="input" id="email" placeholder="Enter your email address" />
        <button class="btn" id="btn" onclick="join()">Join Waitlist</button>
    </div>
    <div class="success" id="success">🎉 You're on the list! We'll let you know when we launch.</div>
    <p class="note" id="note">Launching soon.</p>
</div>

<footer>
    <p>&copy; 2026 Careerely. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const client = supabase.createClient(
    'https://loqhbrtsiqktbhneyfvw.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xbHRicnRzaXFrdGJobmV5ZnZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODEwODgsImV4cCI6MjA5Mjg1NzA4OH0.HMNMh0YI3PPJH0ZN_QatpVateaHOFgT3wELyeExya7M'
);

async function join() {
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
        document.getElementById('email').style.borderColor = '#ef4444';
        return;
    }
    const btn = document.getElementById('btn');
    btn.textContent = 'Joining...';
    btn.disabled = true;
    const { error } = await client.from('waitlist').insert([{ email }]);
    if (error && error.code !== '23505') {
        btn.textContent = 'Join Waitlist';
        btn.disabled = false;
       Error: ' + error.message + ' Code: ' + error.code
        return;
    }
    document.getElementById('form').style.display = 'none';
    document.getElementById('note').style.display = 'none';
    document.getElementById('success').style.display = 'block';
}

document.getElementById('email').addEventListener('keypress', e => { if(e.key === 'Enter') join(); });
</script>
</body>
</html>
