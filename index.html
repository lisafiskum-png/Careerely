<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careerely — Applications That Sound Like You</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#06060b;
            --border:rgba(255,255,255,0.06);
            --text:#eaeaf0;
            --text-mid:#9898ad;
            --text-dim:#64647a;
            --gradient:linear-gradient(135deg,#ec4899,#a855f7,#7c3aed);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{
            font-family:'Sora',sans-serif;
            background:var(--bg);
            color:var(--text);
            -webkit-font-smoothing:antialiased;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            text-align:center;
            padding:24px;
            overflow:hidden;
        }
        body::before{
            content:'';
            position:fixed;
            top:-200px;left:50%;
            transform:translateX(-50%);
            width:800px;height:800px;
            background:radial-gradient(circle,rgba(124,58,237,0.07) 0%,rgba(236,72,153,0.04) 40%,transparent 70%);
            filter:blur(60px);
            pointer-events:none;
        }
        body::after{
            content:'';
            position:fixed;inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events:none;
            z-index:9999;
        }
        .logo{font-weight:700;font-size:18px;letter-spacing:-0.3px;margin-bottom:48px}
        .logo span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        h1{font-size:clamp(38px,6vw,68px);font-weight:800;line-height:1.08;letter-spacing:-2px;max-width:680px;margin-bottom:20px}
        h1 .gr{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sub{font-size:16px;line-height:1.6;color:var(--text-mid);max-width:440px;margin-bottom:36px}
        .waitlist-form{display:flex;gap:10px;align-items:center;width:100%;max-width:460px;margin-bottom:12px}
        .waitlist-input{flex:1;padding:13px 18px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:all 0.2s}
        .waitlist-input::placeholder{color:var(--text-dim)}
        .waitlist-input:focus{border-color:rgba(124,58,237,0.4);background:rgba(255,255,255,0.06)}
        .btn{background:var(--gradient);color:white;padding:13px 26px;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:all 0.25s;box-shadow:0 4px 16px rgba(124,58,237,0.2)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.35)}
        .note{font-size:12px;color:var(--text-dim)}
        .success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#22c55e;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;display:none;max-width:460px;width:100%;margin-bottom:12px}
    </style>
</head>
<body>
    <div class="logo">Career<span>ely</span></div>
    <h1>Stop writing applications.<br><span class="gr">Start landing jobs.</span></h1>
    <p class="sub">One tailored application outperforms a hundred generic ones. Careerely writes cover letters that sound like you, not like AI.</p>
    <div class="waitlist-form">
        <input type="email" class="waitlist-input" id="waitlistEmail" placeholder="Enter your email address" />
        <button class="btn" onclick="joinWaitlist()">Join Waitlist</button>
    </div>
    <div class="success" id="waitlistSuccess">🎉 You're on the list! We'll let you know when we launch.</div>
    <p class="note">Launching soon.</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
    const SUPABASE_URL = 'https://loqhbrtsiqktbhneyfvw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fGzwQbrEox7o0Mxa9h493Q_A12yfn-s';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function joinWaitlist() {
        const email = document.getElementById('waitlistEmail').value;
        if (!email || !email.includes('@')) {
            document.getElementById('waitlistEmail').style.borderColor = '#ef4444';
            return;
        }
        const btn = event.target;
        btn.textContent = 'Joining...';
        btn.disabled = true;
        const { error } = await supabaseClient.from('waitlist').insert([{ email, created_at: new Date().toISOString() }]);
        if (error && error.code !== '23505') {
            btn.textContent = 'Join Waitlist';
            btn.disabled = false;
            alert('Something went wrong. Please try again.');
            return;
        }
        document.querySelector('.waitlist-form').style.display = 'none';
        document.getElementById('waitlistSuccess').style.display = 'block';
    }

    document.getElementById('waitlistEmail').addEventListener('keypress', e => {
        if (e.key === 'Enter') joinWaitlist();
    });
</script>
</body>
</html>
